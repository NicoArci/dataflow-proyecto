services:
  postgres:
    image: postgres:15-alpine
    container_name: dataflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dataflow}
      POSTGRES_USER: ${POSTGRES_USER:-dataflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dataflow_pass}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dataflow_user} -d ${POSTGRES_DB:-dataflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dataflow-net

  mongodb:
    image: mongo:7
    container_name: dataflow-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dataflow-net

volumes:
  postgres_data:
  mongo_data:

networks:
  dataflow-net:
    driver: bridge
